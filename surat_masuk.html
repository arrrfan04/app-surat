<!doctype html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Masuk - SINOTIS</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #3d7ab5 100%);
        }
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(45, 90, 135, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #2d5a87 0%, #1e3a5f 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 58, 95, 0.4);
        }
        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }
        .toast {
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
        }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2d5a87;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-full gradient-bg">
    <div id="app-container" class="h-full overflow-auto">
        <div id="toast-container" class="fixed top-4 right-4 z-50"></div>
        <div class="min-h-full p-4 md:p-6 lg:p-8">
            <header class="relative flex flex-col items-center mb-6 md:mb-8 text-center">
                <div class="w-full flex justify-end md:absolute md:top-0 md:left-0 md:right-0 mb-4 md:mb-0">
                    <div class="flex items-center gap-4">
                        <div id="user-profile" class="bg-white/10 px-3 py-1.5 rounded-lg backdrop-blur-sm border border-white/20 text-right hidden md:block">
                            <p id="display-name" class="text-white text-xs font-bold leading-tight">Admin</p>
                            <p id="display-role" class="text-blue-200 text-[10px] leading-tight font-medium">Administrator</p>
                        </div>
                        <button id="logoutBtn" class="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-4 py-2 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 backdrop-blur-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                            </svg>
                            Keluar
                        </button>
                    </div>
                </div>
                <div class="inline-flex flex-col items-center gap-3">
                    <div class="w-12 h-12 md:w-14 md:h-14 bg-white rounded-xl flex items-center justify-center shadow-lg overflow-hidden">
                        <img src="logo-kemenimpas.png" alt="Logo" class="w-10 h-10 md:w-12 md:h-12 object-contain">
                    </div>
                    <h1 class="text-2xl md:text-3xl lg:text-4xl font-bold text-white drop-shadow-lg">Registrasi Surat Masuk</h1>
                    <p class="text-blue-100 mt-2 text-sm md:text-base">Pencatatan Surat Masuk Lapas Perempuan Ternate</p>
                </div>
            </header>

            <main class="max-w-6xl mx-auto">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 items-start">
                    <div class="glass-card rounded-2xl shadow-2xl overflow-hidden h-full">
                        <div class="p-5 md:p-8">
                            <form id="surat-form" class="space-y-5">
                                <div>
                                    <label for="tanggal" class="block text-sm font-semibold text-gray-700 mb-2">📅 Tanggal Surat</label>
                                    <input type="date" id="tanggal" name="tanggal" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 input-focus focus:border-[#2d5a87] outline-none transition-all text-gray-700" required>
                                </div>
                                <div>
                                    <label for="nama-pengirim" class="block text-sm font-semibold text-gray-700 mb-2">👤 Nama Pengirim / Instansi</label>
                                    <input type="text" id="nama-pengirim" name="nama_pengirim" placeholder="Masukkan nama pengirim atau instansi asal" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 input-focus focus:border-[#2d5a87] outline-none transition-all text-gray-700" required>
                                </div>
                                <div>
                                    <label for="nomor-surat" class="block text-sm font-semibold text-gray-700 mb-2">🔢 Nomor Surat Asal</label>
                                    <input type="text" id="nomor-surat" name="nomor_surat" placeholder="Masukkan nomor surat yang tertera pada fisik surat" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 input-focus focus:border-[#2d5a87] outline-none transition-all text-gray-700" required>
                                </div>
                                <div>
                                    <label for="perihal" class="block text-sm font-semibold text-gray-700 mb-2">📝 Perihal</label>
                                    <textarea id="perihal" name="perihal" placeholder="Masukkan perihal surat" rows="4" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 input-focus focus:border-[#2d5a87] outline-none transition-all text-gray-700 resize-none" required></textarea>
                                </div>
                                <div>
                                    <label for="sifat-surat" class="block text-sm font-semibold text-gray-700 mb-2">⚡ Sifat Surat</label>
                                    <select id="sifat-surat" name="sifat_surat" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 input-focus focus:border-[#2d5a87] outline-none transition-all bg-white cursor-pointer text-gray-700" required>
                                        <option value="">-- Pilih Sifat Surat --</option>
                                        <option value="Rahasia">🔒 Rahasia</option>
                                        <option value="Sangat Segera">🚨 Sangat Segera</option>
                                        <option value="Segera">⚡ Segera</option>
                                        <option value="Penting">❗ Penting</option>
                                        <option value="Biasa">📄 Biasa</option>
                                    </select>
                                </div>
                                <button type="submit" id="btn-save" class="w-full btn-primary text-white font-semibold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                                    </svg>
                                    <span id="btn-text">Simpan Surat Masuk</span>
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="glass-card rounded-2xl shadow-2xl overflow-hidden h-full">
                        <div class="p-5 md:p-6 h-full flex flex-col">
                            <div class="flex items-center justify-between mb-4">
                                <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                                    <svg class="w-5 h-5 text-[#2d5a87]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                    Riwayat Surat Masuk
                                </h2>
                                <button id="btn-download-rekap" onclick="downloadRekapPDF()" class="bg-[#2d5a87] hover:bg-[#1e3a5f] text-white px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-2 shadow-sm">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                    </svg>
                                    Download Rekap
                                </button>
                            </div>
                            <div id="history-container" class="space-y-4 flex-1 overflow-auto max-h-[700px] pr-2">
                                <p class="text-gray-500 text-sm text-center py-4">Memuat riwayat...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
            <footer class="text-center mt-8 pb-6">
                <p class="text-blue-100 text-sm">© 2026 Hak Cipta Lapas Perempuan Kelas III Ternate</p>
            </footer>
        </div>
    </div>

    <script>
        const config = {
            script_url: 'https://script.google.com/macros/s/AKfycbx9IE5I5SgewMlWO_cNf3ayO7qnTJwiVVrjeQFf1K6a2ObiDW2n_Hrun8Z92qcYJY4/exec'
        };

        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }

        let currentHistoryData = [];

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            toast.className = `toast ${bgColor} text-white px-4 py-3 rounded-lg shadow-lg mb-2 flex items-center gap-2`;
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatTanggal(isoString) {
            if (!isoString) return '-';
            try {
                const date = new Date(isoString);
                return date.toLocaleDateString('id-ID', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            } catch (e) {
                return isoString;
            }
        }

        function setDefaultDate() {
            const dateInput = document.getElementById('tanggal');
            const now = new Date();
            dateInput.value = now.toISOString().split('T')[0];
        }

        async function fetchHistory() {
            try {
                const response = await fetch(`${config.script_url}?action=getRekap&type=masuk`);
                const result = await response.json();
                if (result.status === 'success') {
                    currentHistoryData = result.data;
                    renderHistory(result.data);
                }
            } catch (error) {
                console.error('Error fetching history:', error);
            }
        }

        function renderHistory(data) {
            const container = document.getElementById('history-container');
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm text-center py-4">Belum ada riwayat surat masuk</p>';
                return;
            }
            
            container.innerHTML = '';
            data.forEach(item => {
                // v41: Resilience to trailing underscores in spreadsheet headers
                const getVal = (k) => item[k] !== undefined ? item[k] : (item[k+'_'] !== undefined ? item[k+'_'] : '-');
                const sifat = getVal('sifat_surat');
                const nomor = getVal('nomor_surat');
                const perihal = getVal('perihal');
                const tanggal = getVal('tanggal');
                const pengirim = getVal('nama_pengirim');

                const itemEl = document.createElement('div');
                itemEl.className = 'bg-gray-50 rounded-lg p-4 border border-gray-100 hover:shadow-md transition-shadow';
                itemEl.innerHTML = `
                    <div class="flex justify-between items-start gap-4">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="px-2 py-0.5 bg-green-100 text-green-800 text-[10px] font-bold rounded-full uppercase">${sifat}</span>
                                <p class="font-bold text-[#1e3a5f] text-sm truncate">${nomor}</p>
                            </div>
                            <p class="text-xs font-semibold text-gray-800 mb-1 leading-tight">${perihal}</p>
                            <div class="flex items-center gap-2 text-[10px] text-gray-500">
                                <span>📅 ${formatTanggal(tanggal)}</span>
                                <span>•</span>
                                <span>👤 ${pengirim}</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(itemEl);
            });
        }

        document.getElementById('surat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            const btnText = document.getElementById('btn-text');
            const originalText = btnText.textContent;
            
            btn.disabled = true;
            btnText.textContent = 'Menyimpan...';

            const formData = new FormData(e.target);
            // v38: Aligned parameters with GAS script expectations
            const data = {
                action: 'saveSurat',
                type: 'masuk',
                tanggal: formData.get('tanggal'),
                nama_pengirim: formData.get('nama_pengirim'),
                nomor_surat: formData.get('nomor_surat'),
                perihal: formData.get('perihal'),
                sifat_surat: formData.get('sifat_surat'),
                // Adding missing parameters to match GAS row structure if needed
                no_urut: '', 
                kode_klasifikasi: '',
                tujuan_surat: ''
            };

            try {
                const url = new URL(config.script_url);
                for (let key in data) url.searchParams.append(key, data[key]);
                
                console.log('Attempting to save to:', url.toString());
                
                await fetch(url.toString(), { 
                  method: 'GET',
                  mode: 'no-cors'
                }).catch(err => console.error('Fetch network error (expected in no-cors):', err));
                
                e.target.reset();
                setDefaultDate();
                
                setTimeout(() => {
                  fetchHistory();
                  showToast('✓ Data Berhasil Disimpan', 'success');
                }, 2000);
            } catch (error) {
                console.error('Save error:', error);
                showToast('Gagal terhubung: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btnText.textContent = originalText;
            }
        });

        // Rekap PDF
        window.downloadRekapPDF = function() {
            if (!currentHistoryData.length) return showToast('Tidak ada data', 'error');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            doc.setFontSize(18);
            doc.text('REKAPAN SURAT MASUK', 148, 15, { align: 'center' });
            doc.setFontSize(14);
            doc.text('LAPAS PEREMPUAN KELAS III TERNATE', 148, 25, { align: 'center' });
            
            const tableBody = currentHistoryData.map((item, i) => {
                const getVal = (k) => item[k] !== undefined ? item[k] : (item[k+'_'] !== undefined ? item[k+'_'] : '-');
                return [
                    i + 1, 
                    formatTanggal(getVal('tanggal')), 
                    getVal('nama_pengirim'), 
                    getVal('nomor_surat'), 
                    getVal('perihal'), 
                    getVal('sifat_surat')
                ];
            });

            doc.autoTable({
                startY: 35,
                head: [['No', 'Tgl Surat', 'Pengirim', 'Nomor Surat', 'Perihal', 'Sifat']],
                body: tableBody,
                headStyles: { fillColor: [45, 90, 135] }
            });
            
            // Footer
            const finalY = doc.lastAutoTable.finalY || 150;
            doc.setFontSize(8);
            doc.setTextColor(150);
            const timestamp = new Date().toLocaleString('id-ID');
            doc.text(`Banyaknya records: ${currentHistoryData.length} | Dicetak pada: ${timestamp}`, 15, finalY + 15);

            doc.save('REKAPAN_SURAT_MASUK.pdf');
        };

        document.addEventListener('DOMContentLoaded', () => {
            setDefaultDate();
            fetchHistory();
            const userData = JSON.parse(sessionStorage.getItem('userData') || '{}');
            document.getElementById('display-name').textContent = userData.nama || 'User';
            document.getElementById('display-role').textContent = userData.role || 'Petugas';
            document.getElementById('user-profile').classList.remove('hidden');
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.clear();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
